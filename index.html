<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <meta name="description" content="Zinong2017 — AI Agent 产品经理 · PM 数字员工">
  <title>Zinong2017 | PM 数字员工</title>
  <base href="./" id="site-base">
  <script>
    (function(){var h=location.hostname||'',p=location.pathname||'/';if(/github\.io$/i.test(h)){document.getElementById('site-base').href='/zinong2017/';if(/\/zinong2017$/.test(p))location.replace(p+'/'+location.search+location.hash);}})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
</head>
<body>
  <!-- ====== 主容器：豆包风格双栏 ====== -->
  <div class="app" id="app">
    <!-- ====== 左侧栏 ====== -->
    <aside class="sidebar" id="sidebar">
      <!-- 新对话按钮 -->
      <div class="sidebar__top">
        <button class="sidebar__new-chat" id="sidebarNewChat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
          新对话
        </button>
        <!-- 搜索技能 -->
        <div class="sidebar__search-wrap">
          <input type="text" class="sidebar__search" id="sidebarSearch" placeholder="搜索 PM 技能..." autocomplete="off">
        </div>
      </div>

      <!-- 技能域列表 -->
      <nav class="sidebar__skills" id="sidebarSkills">
        <!-- JS 填充 -->
      </nav>

      <!-- 对话历史 -->
      <div class="sidebar__history" id="sidebarHistory">
        <div class="sidebar__history-title">对话历史</div>
        <div class="sidebar__history-list" id="sidebarHistoryList">
          <!-- JS 填充 -->
        </div>
      </div>

      <!-- 用户区 -->
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">Z</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Zinong2017</div>
          <div class="sidebar__user-role">PM 数字员工 · 56 技能</div>
        </div>
      </div>
    </aside>

    <!-- ====== 主聊天区 ====== -->
    <div class="main" id="main">
      <!-- 顶部：模型标识 + 侧边栏展开 -->
      <header class="main__header">
        <button class="main__menu-btn" id="mainMenuBtn" aria-label="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="main__model-badge" id="mainModelBadge">
          <span class="main__model-dot"></span>
          DeepSeek · PM Agent
        </div>
      </header>

      <!-- 聊天区域 -->
      <div class="main__body" id="mainBody">
        <!-- ====== 欢迎页 ====== -->
        <div class="welcome" id="welcome">
          <div class="welcome__inner">
            <div class="welcome__avatar">Z</div>
            <h1 class="welcome__title">Zinong2017 · PM 数字员工</h1>
            <p class="welcome__desc">AI Agent 产品经理的 AI 分身 · 56 项 PM 技能随时待命</p>

            <!-- 推荐话题卡片 -->
            <div class="welcome__cards" id="welcomeCards">
              <button class="welcome-card" data-prompt="帮我写一份 AI Agent 产品的 PRD 文档。产品方向你根据当前热点自行推荐。">
                <span class="welcome-card__icon">📄</span>
                <span class="welcome-card__title">撰写 PRD</span>
                <span class="welcome-card__desc">完整产品需求文档</span>
              </button>
              <button class="welcome-card" data-prompt="请对主流 AI Agent 平台做一份竞品分析，对比功能、体验、定位和商业模式。">
                <span class="welcome-card__icon">🔍</span>
                <span class="welcome-card__title">竞品分析</span>
                <span class="welcome-card__desc">多维对比与差异化建议</span>
              </button>
              <button class="welcome-card" data-prompt="请帮我设计一套 AI 产品的核心指标体系，包含北极星指标、过程指标和质量指标。">
                <span class="welcome-card__icon">📊</span>
                <span class="welcome-card__title">指标设计</span>
                <span class="welcome-card__desc">北极星 + 过程 + 质量</span>
              </button>
              <button class="welcome-card" data-prompt="请作为 PM 职业导师，和我聊聊产品经理的职业发展规划。">
                <span class="welcome-card__icon">🎓</span>
                <span class="welcome-card__title">职业教练</span>
                <span class="welcome-card__desc">PM 能力成长与规划</span>
              </button>
            </div>
          </div>
        </div>

        <!-- ====== 消息列表 ====== -->
        <div class="chat-list" id="chatList">
          <!-- 欢迎消息 -->
          <div class="chat-msg chat-msg--assistant chat-msg--welcome" id="chatWelcome">
            <div class="chat-msg__avatar">Z</div>
            <div class="chat-msg__bubble">
              <p>你好！我是 <strong>Zinong2017 的 PM 数字员工</strong> 👋</p>
              <p>我可以帮你完成产品经理的各类工作：写 PRD、竞品分析、需求拆解、策略规划、职业辅导……</p>
              <p>输入 <code>/</code> 查看所有技能命令，或直接告诉我你需要什么。</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ====== 斜杠命令弹窗 ====== -->
      <div class="cmd-popup" id="cmdPopup" hidden>
        <div class="cmd-popup__list" id="cmdPopupList"></div>
      </div>

      <!-- ====== 思考过程 ====== -->
      <div class="thinking-bar" id="thinkingBar" hidden>
        <button class="thinking-bar__toggle" id="thinkingToggle">
          <span>🧠 思考过程</span>
          <span class="thinking-bar__chevron">▾</span>
        </button>
        <div class="thinking-bar__body" id="thinkingBody"></div>
      </div>

      <!-- ====== 输入区 ====== -->
      <div class="input-area" id="inputArea">
        <div class="input-area__row">
          <!-- 技能标签 -->
          <div class="input-area__tags" id="inputTags">
            <button class="input-tag" data-domain="execution">📄 写文档</button>
            <button class="input-tag" data-domain="strategy">🎯 定策略</button>
            <button class="input-tag" data-domain="research">📊 做研究</button>
            <button class="input-tag" data-domain="mentor">🎓 问导师</button>
            <button class="input-tag" data-domain="analytics">📈 看数据</button>
            <button class="input-tag" data-domain="toolkit">🧰 工具箱</button>
          </div>
          <!-- 输入框 -->
          <div class="input-area__box">
            <textarea class="input-area__input" id="chatInput" rows="1"
              placeholder="输入 PM 需求或按 / 使用命令..."
              maxlength="3000" aria-label="输入消息"></textarea>
            <button class="input-area__send" id="chatSend" aria-label="发送">
              <svg class="input-area__send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              <svg class="input-area__stop-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" hidden><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
        </div>
        <p class="input-area__hint">内容由 DeepSeek 生成 · Zinong2017 AI 分身</p>
      </div>
    </div>
  </div>

  <!-- ====== 微信弹窗 ====== -->
  <div class="modal" id="wechatModal" role="dialog" aria-modal="true" hidden>
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__card">
      <button class="modal__close" data-close-modal>&times;</button>
      <h3>扫码添加微信</h3>
      <img class="modal__qr" src="assets/img/wechat-qr.png" alt="微信二维码" width="200" height="200"
        onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23F7FAFC%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23718096%22 font-size=%2214%22%3E二维码%3C/text%3E%3C/svg%3E'">
      <p>备注「Agent 产品」更易通过</p>
    </div>
  </div>

  <script src="js/pm-skills.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
